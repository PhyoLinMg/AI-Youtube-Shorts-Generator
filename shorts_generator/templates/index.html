<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AI Shorts Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Special+Elite&family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      /* darkroom / film-lab palette — warm shadow, safelight glow, fixer green */
      --ink: #150f0a;
      --tray: #201810;
      --tray-2: #2b2116;
      --rule: #3d2f21;
      --paper: #f2e7d6;
      --ash: #a3907a;
      --safelight: #e05a24;
      --fixer: #6fae93;
      --dev-amber: #d6a94a;
      --mono: "IBM Plex Mono", ui-monospace, "SF Mono", Menlo, Consolas, monospace;
      --sans: "IBM Plex Sans", system-ui, -apple-system, "Segoe UI", sans-serif;
      --display: "Special Elite", var(--mono);
    }

    * { box-sizing: border-box; }

    html { background: var(--ink); }

    body {
      position: relative;
      font-family: var(--sans);
      background: var(--ink);
      color: var(--paper);
      max-width: 1280px;
      margin: 0 auto;
      padding: 1.5rem 1.5rem 3.5rem;
    }

    /* faint grain — the one accessory this design keeps */
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      opacity: 0.05;
      mix-blend-mode: overlay;
      background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='120' height='120'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2' stitchTiles='stitch'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
    }

    body > * { position: relative; z-index: 1; }

    /* --- top bar: darkroom timer readout --- */
    .top-bar {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 1rem;
      padding-bottom: 1.1rem;
      margin-bottom: 1.75rem;
      border-bottom: 1px solid var(--rule);
    }
    .brand { display: grid; gap: 0.3rem; }
    .wordmark {
      font-family: var(--display);
      font-size: 1.15rem;
      letter-spacing: 0.05em;
      color: var(--paper);
    }
    .tagline {
      font-size: 0.78rem;
      color: var(--ash);
    }
    .osd {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      font-family: var(--mono);
      font-size: 0.8rem;
      letter-spacing: 0.08em;
      color: var(--ash);
      flex-shrink: 0;
    }
    .osd-dot {
      width: 11px;
      height: 11px;
      border-radius: 50%;
      background: var(--rule);
      flex-shrink: 0;
    }
    .osd-dot.is-rec {
      background: radial-gradient(circle at 35% 30%, #ff9a5c, var(--safelight) 65%, #7a2a10 100%);
      box-shadow: 0 0 9px 2px rgba(224, 90, 36, 0.65);
      animation: pulse 1.1s ease-in-out infinite;
    }
    .osd-dot.is-ok {
      background: radial-gradient(circle at 35% 30%, #b6e2cf, var(--fixer) 65%, #2f5f4e 100%);
      box-shadow: 0 0 8px 1px rgba(111, 174, 147, 0.55);
    }
    .osd-dot.is-warn {
      background: radial-gradient(circle at 35% 30%, #f0d698, var(--dev-amber) 65%, #7a5a1e 100%);
      box-shadow: 0 0 8px 1px rgba(214, 169, 74, 0.55);
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }
    @media (prefers-reduced-motion: reduce) {
      .osd-dot.is-rec { animation: none; }
    }

    /* --- eyebrow / section labels --- */
    .eyebrow {
      font-family: var(--display);
      font-size: 0.82rem;
      letter-spacing: 0.06em;
      color: var(--ash);
      margin: 0 0 1.1rem;
    }

    /* --- corner-bracket loupe frame, reused at a few scales --- */
    .frame {
      --vf-c: var(--rule);
      --vf-s: 14px;
      --vf-w: 2px;
      position: relative;
      background-image:
        linear-gradient(var(--vf-c), var(--vf-c)), linear-gradient(var(--vf-c), var(--vf-c)),
        linear-gradient(var(--vf-c), var(--vf-c)), linear-gradient(var(--vf-c), var(--vf-c)),
        linear-gradient(var(--vf-c), var(--vf-c)), linear-gradient(var(--vf-c), var(--vf-c)),
        linear-gradient(var(--vf-c), var(--vf-c)), linear-gradient(var(--vf-c), var(--vf-c));
      background-repeat: no-repeat;
      background-size:
        var(--vf-s) var(--vf-w), var(--vf-w) var(--vf-s),
        var(--vf-s) var(--vf-w), var(--vf-w) var(--vf-s),
        var(--vf-s) var(--vf-w), var(--vf-w) var(--vf-s),
        var(--vf-s) var(--vf-w), var(--vf-w) var(--vf-s);
      background-position:
        top left, top left,
        top right, top right,
        bottom left, bottom left,
        bottom right, bottom right;
    }

    /* --- layout --- */
    .layout {
      display: grid;
      grid-template-columns: minmax(0, 380px) minmax(0, 1fr);
      gap: 1.5rem;
      align-items: start;
    }
    .layout[hidden] { display: none; }
    @media (max-width: 900px) {
      .layout { grid-template-columns: 1fr; }
    }
    .stack { display: grid; gap: 1.5rem; }

    .panel {
      background-color: var(--tray);
      border: 1px solid var(--rule);
      border-radius: 3px;
      padding: 1.2rem 1.2rem 1.4rem;
    }

    #error-banner {
      background: rgba(224, 90, 36, 0.12);
      border: 1px solid var(--safelight);
      color: #ffb591;
      font-family: var(--mono);
      font-size: 0.85rem;
      padding: 0.6rem 0.8rem;
      border-radius: 3px;
      margin-bottom: 1rem;
      display: none;
    }

    /* --- form --- */
    fieldset { border: 0; padding: 0; margin: 0; }
    label {
      display: block;
      margin: 0.8rem 0 0.3rem;
      font-size: 0.78rem;
      letter-spacing: 0.02em;
      color: var(--ash);
    }
    label:first-child { margin-top: 0; }
    input[type=text], input[type=number], select {
      width: 100%;
      background: var(--tray-2);
      border: 1px solid var(--rule);
      color: var(--paper);
      border-radius: 3px;
      padding: 0.5rem 0.6rem;
      font-family: var(--sans);
      font-size: 0.9rem;
    }
    input::placeholder { color: #6b5c48; }
    input[type=text]:focus-visible, input[type=number]:focus-visible,
    select:focus-visible, button:focus-visible, a:focus-visible {
      outline: 2px solid var(--safelight);
      outline-offset: 2px;
    }
    .row { display: flex; gap: 0.9rem; }
    .row > div { flex: 1; }
    .checkbox-row { display: flex; align-items: center; gap: 0.4rem; }
    .checkbox-row label { display: flex; align-items: center; gap: 0.4rem; margin: 0; color: var(--paper); font-size: 0.85rem; }
    input[type=checkbox] { accent-color: var(--safelight); width: 15px; height: 15px; }

    button {
      width: 100%;
      margin-top: 1.4rem;
      padding: 0.7rem 1.2rem;
      background: var(--safelight);
      color: #1c0a02;
      font-family: var(--sans);
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      font-size: 0.85rem;
      border: none;
      border-radius: 3px;
      cursor: pointer;
    }
    button:hover:not(:disabled) { background: #ef6b34; }
    button:disabled { opacity: 0.4; cursor: not-allowed; }

    /* --- processing console (enlarger timer log) --- */
    #log {
      background: var(--tray-2);
      color: var(--fixer);
      font-family: var(--mono);
      font-size: 0.78rem;
      padding: 0.9rem;
      height: 220px;
      overflow-y: auto;
      white-space: pre-wrap;
      border-radius: 3px;
      margin: 0;
      border: 1px solid var(--rule);
    }

    /* --- clips (contact sheet) --- */
    .results-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 1.1rem;
    }
    .card {
      --vf-c: var(--rule);
      position: relative;
      background-color: var(--tray-2);
      border: 1px solid var(--rule);
      border-radius: 2px;
      padding: 1.5rem 0.85rem 1.15rem;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      opacity: 0;
      transform: translateY(4px);
      animation: card-in 0.18s ease-out forwards;
    }
    /* sprocket-hole strip along top/bottom edge, like a strip of film stock */
    .card::before, .card::after {
      content: "";
      position: absolute;
      left: 0;
      right: 0;
      height: 11px;
      background-image: radial-gradient(circle, var(--ink) 2.1px, transparent 2.2px);
      background-size: 15px 11px;
      background-repeat: repeat-x;
      background-position: 7px center;
      opacity: 0.9;
    }
    .card::before { top: 0; }
    .card::after { bottom: 0; }
    @keyframes card-in { to { opacity: 1; transform: none; } }
    @media (prefers-reduced-motion: reduce) {
      .card { animation: none; opacity: 1; transform: none; }
    }
    .card.failed { --vf-c: var(--dev-amber); }
    .frame-meta {
      display: flex;
      justify-content: space-between;
      font-family: var(--mono);
      font-size: 0.68rem;
      letter-spacing: 0.03em;
      color: var(--ash);
      text-transform: uppercase;
    }
    .card-title {
      font-size: 0.85rem;
      font-weight: 600;
      line-height: 1.3;
      color: var(--paper);
    }
    .meter {
      position: relative;
      height: 5px;
      background: var(--tray);
      border: 1px solid var(--rule);
      border-radius: 1px;
      overflow: hidden;
      background-image: repeating-linear-gradient(
        to right,
        var(--rule) 0, var(--rule) 1px,
        transparent 1px, transparent 10%
      );
    }
    .meter > span {
      position: absolute;
      inset: 0 auto 0 0;
      background: var(--safelight);
    }
    .score-row {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-family: var(--mono);
      font-size: 0.72rem;
      color: var(--ash);
    }
    .score-row .meter { flex: 1; }
    .field-label {
      font-family: var(--mono);
      font-size: 0.62rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--ash);
      margin-top: 0.15rem;
    }
    .pitch {
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--paper);
      line-height: 1.35;
    }
    .hook {
      font-size: 0.78rem;
      color: var(--ash);
      line-height: 1.35;
    }
    .reason {
      font-size: 0.72rem;
      color: var(--ash);
      font-style: italic;
      line-height: 1.3;
    }
    .video-frame {
      --vf-c: var(--rule);
      --vf-s: 10px;
      aspect-ratio: 9 / 16;
      background-color: #000;
      border-radius: 2px;
      overflow: hidden;
    }
    .video-frame video { width: 100%; height: 100%; object-fit: cover; display: block; }
    .card a.download {
      font-family: var(--mono);
      font-size: 0.75rem;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: var(--fixer);
      text-decoration: none;
      border: 1px solid var(--rule);
      border-radius: 2px;
      padding: 0.35rem 0;
      text-align: center;
    }
    .card a.download:hover { border-color: var(--fixer); }
    .copy-row { display: flex; }
    button.copy-btn {
      width: auto;
      margin-top: 0;
      flex: 1;
      font-family: var(--mono);
      font-size: 0.68rem;
      letter-spacing: 0.03em;
      text-transform: uppercase;
      background: transparent;
      color: var(--ash);
      border: 1px solid var(--rule);
      border-radius: 2px;
      padding: 0.3rem 0;
    }
    button.copy-btn:hover { border-color: var(--paper); color: var(--paper); }
    button.copy-btn.is-copied { border-color: var(--fixer); color: var(--fixer); }
    .card-note {
      font-family: var(--mono);
      font-size: 0.7rem;
      color: var(--dev-amber);
    }
    .card-status {
      font-family: var(--mono);
      font-size: 0.72rem;
      color: var(--dev-amber);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
    .card-error {
      font-size: 0.78rem;
      color: var(--ash);
    }

    /* --- tabs --- */
    .tabs { display: flex; gap: 0.5rem; margin-bottom: 1.4rem; }
    .tab-btn {
      width: auto;
      margin-top: 0;
      font-family: var(--display);
      font-size: 0.8rem;
      letter-spacing: 0.03em;
      text-transform: uppercase;
      background: transparent;
      color: var(--ash);
      border: 1px solid var(--rule);
      border-radius: 3px;
      padding: 0.45rem 1rem;
      cursor: pointer;
    }
    .tab-btn.is-active { color: var(--paper); border-color: var(--paper); }

    /* --- history --- */
    .history-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1rem;
    }
    .history-refresh-btn {
      width: auto;
      margin-top: 0;
      padding: 0.35rem 0.8rem;
      font-family: var(--mono);
      font-size: 0.72rem;
      letter-spacing: 0.03em;
      text-transform: uppercase;
      background: transparent;
      color: var(--ash);
      border: 1px solid var(--rule);
      border-radius: 2px;
    }
    .history-refresh-btn:hover { border-color: var(--paper); color: var(--paper); }
    .history-row {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 0.6rem 1.2rem;
      padding: 0.7rem 0;
      border-bottom: 1px solid var(--rule);
      font-family: var(--mono);
      font-size: 0.8rem;
    }
    .history-row:last-child { border-bottom: none; }
    .history-name { flex: 1 1 220px; font-weight: 600; color: var(--paper); }
    .history-date { color: var(--ash); }
    .history-item { display: flex; align-items: center; gap: 0.5rem; }
    .history-delete-btn {
      width: auto;
      margin-top: 0;
      padding: 0.25rem 0.6rem;
      font-family: var(--mono);
      font-size: 0.68rem;
      letter-spacing: 0.03em;
      text-transform: uppercase;
      background: transparent;
      color: var(--safelight);
      border: 1px solid var(--rule);
      border-radius: 2px;
      cursor: pointer;
    }
    .history-delete-btn:hover { border-color: var(--safelight); }
    .history-empty { color: var(--ash); font-size: 0.85rem; }
  </style>
</head>
<body>
  <header class="top-bar">
    <div class="brand">
      <span class="wordmark">AI SHORTS LAB</span>
      <span class="tagline">Footage in. Cut, captioned vertical shorts out.</span>
    </div>
    <span class="osd">
      <span class="osd-dot" id="osd-dot"></span>
      <span id="status-line">STANDBY</span>
    </span>
  </header>

  <div id="error-banner" role="alert"></div>

  <nav class="tabs">
    <button type="button" class="tab-btn is-active" data-tab="generate">Generate</button>
    <button type="button" class="tab-btn" data-tab="history">History</button>
  </nav>

  <main class="layout" id="tab-generate">
    <section class="panel frame">
      <h2 class="eyebrow">Footage</h2>
      <form id="run-form">
        <fieldset>
          <label for="url">YouTube URL</label>
          <input type="text" id="url" name="url" placeholder="https://www.youtube.com/watch?v=..." required>

          <div class="row">
            <div>
              <label for="mode">Mode</label>
              <select id="mode" name="mode">
                <option value="api">api</option>
                <option value="local">local</option>
              </select>
            </div>
            <div>
              <label for="num_clips">Num clips</label>
              <input type="number" id="num_clips" name="num_clips" value="3" min="1">
            </div>
          </div>

          <div class="row">
            <div>
              <label for="aspect_ratio">Aspect ratio</label>
              <input type="text" id="aspect_ratio" name="aspect_ratio" value="9:16">
            </div>
            <div>
              <label for="format">Download resolution</label>
              <select id="format" name="format">
                <option value="360">360</option>
                <option value="480">480</option>
                <option value="720">720</option>
                <option value="1080" selected>1080</option>
              </select>
            </div>
          </div>

          <div class="row">
            <div>
              <label for="language">Language (blank = auto-detect)</label>
              <input type="text" id="language" name="language" placeholder="en">
            </div>
            <div>
              <label for="framing">Framing (local mode only)</label>
              <select id="framing" name="framing">
                <option value="locked">locked</option>
                <option value="adaptive">adaptive</option>
              </select>
            </div>
          </div>

          <div class="row">
            <div class="checkbox-row">
              <label><input type="checkbox" id="captions" name="captions" checked> Burn captions</label>
            </div>
            <div class="checkbox-row">
              <label><input type="checkbox" id="word_highlight" name="word_highlight" checked> Word highlight</label>
            </div>
          </div>
          <label for="caption_fade_duration">Caption fade (s)</label>
          <input type="number" id="caption_fade_duration" name="caption_fade_duration" value="0.3" step="0.1" min="0">

          <button type="submit" id="submit-btn">Generate shorts</button>
        </fieldset>
      </form>
    </section>

    <section class="stack">
      <section class="panel frame">
        <h2 class="eyebrow">Processing</h2>
        <pre id="log" aria-live="polite"></pre>
      </section>

      <section class="panel" id="results-panel" hidden>
        <h2 class="eyebrow">Clips</h2>
        <div id="results" class="results-grid"></div>
      </section>
    </section>
  </main>

  <section class="panel frame" id="tab-history" hidden>
    <div class="history-header">
      <h2 class="eyebrow">History</h2>
      <button type="button" id="history-refresh" class="history-refresh-btn">Refresh</button>
    </div>
    <div id="history-list"></div>
  </section>

  <script>
    const form = document.getElementById("run-form");
    const submitBtn = document.getElementById("submit-btn");
    const statusLine = document.getElementById("status-line");
    const osdDot = document.getElementById("osd-dot");
    const logEl = document.getElementById("log");
    const resultsEl = document.getElementById("results");
    const resultsPanel = document.getElementById("results-panel");
    const errorBanner = document.getElementById("error-banner");

    const STATUS_LABEL = { idle: "STANDBY", starting: "STARTING", running: "REC", done: "DONE", failed: "FAILED" };
    const STATUS_DOT = { idle: "", starting: "is-rec", running: "is-rec", done: "is-ok", failed: "is-warn" };

    let offset = 0;

    function setBusy(busy) {
      submitBtn.disabled = busy;
    }

    function setStatus(status) {
      statusLine.textContent = STATUS_LABEL[status] || status;
      osdDot.className = "osd-dot " + (STATUS_DOT[status] || "");
    }

    function showError(message) {
      errorBanner.textContent = message;
      errorBanner.style.display = message ? "block" : "none";
    }

    function copyToClipboard(text) {
      if (navigator.clipboard && navigator.clipboard.writeText) {
        return navigator.clipboard.writeText(text);
      }
      const textarea = document.createElement("textarea");
      textarea.value = text;
      textarea.style.position = "fixed";
      textarea.style.opacity = "0";
      document.body.appendChild(textarea);
      textarea.select();
      try {
        document.execCommand("copy");
      } finally {
        document.body.removeChild(textarea);
      }
      return Promise.resolve();
    }

    function makeCopyButton(label, text) {
      const btn = document.createElement("button");
      btn.type = "button";
      btn.className = "copy-btn";
      btn.textContent = label;
      btn.addEventListener("click", () => {
        copyToClipboard(text).then(() => {
          btn.textContent = "Copied";
          btn.classList.add("is-copied");
          setTimeout(() => {
            btn.textContent = label;
            btn.classList.remove("is-copied");
          }, 1200);
        });
      });
      return btn;
    }

    // mm:ss timecode from a source-video offset in seconds
    function formatTimecode(seconds) {
      const total = Math.max(0, Math.round(Number(seconds) || 0));
      const m = Math.floor(total / 60);
      const s = total % 60;
      return String(m).padStart(2, "0") + ":" + String(s).padStart(2, "0");
    }

    function scoreColor(score) {
      if (score >= 75) return "var(--safelight)";
      if (score >= 45) return "var(--dev-amber)";
      return "var(--ash)";
    }

    function appendLabeledText(card, label, className, text) {
      const wrap = document.createElement("div");
      const tag = document.createElement("div");
      tag.className = "field-label";
      tag.textContent = label;
      wrap.appendChild(tag);
      const body = document.createElement("div");
      body.className = className;
      body.textContent = text;
      wrap.appendChild(body);
      card.appendChild(wrap);
    }

    function renderResults(result) {
      resultsEl.innerHTML = "";
      resultsPanel.hidden = !result || !result.shorts || result.shorts.length === 0;
      if (!result || !result.shorts) return;
      result.shorts.forEach((s, idx) => {
        const card = document.createElement("div");
        card.className = "card frame" + (s.download_url ? "" : " failed");

        const meta = document.createElement("div");
        meta.className = "frame-meta";
        const frameNo = document.createElement("span");
        frameNo.textContent = "No. " + String(idx + 1).padStart(2, "0");
        meta.appendChild(frameNo);
        if (typeof s.start_time === "number" && typeof s.end_time === "number") {
          const tc = document.createElement("span");
          tc.textContent = formatTimecode(s.start_time) + "–" + formatTimecode(s.end_time);
          meta.appendChild(tc);
        }
        card.appendChild(meta);

        const titleText = s.title || "Untitled";
        const titleEl = document.createElement("div");
        titleEl.className = "card-title";
        titleEl.textContent = titleText;
        card.appendChild(titleEl);

        if (s.download_url) {
          const titleCopyRow = document.createElement("div");
          titleCopyRow.className = "copy-row";
          titleCopyRow.appendChild(makeCopyButton("Copy title", titleText));
          card.appendChild(titleCopyRow);
          const score = Number(s.score) || 0;
          const scoreRow = document.createElement("div");
          scoreRow.className = "score-row";
          const meter = document.createElement("div");
          meter.className = "meter";
          const meterFill = document.createElement("span");
          meterFill.style.width = score + "%";
          meterFill.style.background = scoreColor(score);
          meter.appendChild(meterFill);
          scoreRow.appendChild(meter);
          const scoreNum = document.createElement("span");
          scoreNum.textContent = score;
          scoreRow.appendChild(scoreNum);
          card.appendChild(scoreRow);

          if (s.description) {
            appendLabeledText(card, "Pitch", "pitch", s.description);
            const descCopyRow = document.createElement("div");
            descCopyRow.className = "copy-row";
            descCopyRow.appendChild(makeCopyButton("Copy description", s.description));
            card.appendChild(descCopyRow);
          }

          if (s.hook_sentence) {
            appendLabeledText(card, "Hook", "hook", s.hook_sentence);
          }

          if (s.virality_reason) {
            appendLabeledText(card, "Why it works", "reason", s.virality_reason);
          }

          const videoFrame = document.createElement("div");
          videoFrame.className = "video-frame frame";
          const video = document.createElement("video");
          video.controls = true;
          video.src = s.download_url;
          videoFrame.appendChild(video);
          card.appendChild(videoFrame);

          if (s.captions_error) {
            const noteEl = document.createElement("div");
            noteEl.className = "card-note";
            noteEl.textContent = "captions failed — clip has no burned-in captions";
            card.appendChild(noteEl);
          }

          const link = document.createElement("a");
          link.className = "download";
          link.href = s.download_url;
          link.setAttribute("download", "");
          link.textContent = "Download";
          card.appendChild(link);
        } else {
          const statusEl = document.createElement("div");
          statusEl.className = "card-status";
          statusEl.textContent = "Failed";
          card.appendChild(statusEl);

          const errEl = document.createElement("div");
          errEl.className = "card-error";
          errEl.textContent = s.error || "unknown error";
          card.appendChild(errEl);
        }
        resultsEl.appendChild(card);
      });
    }

    let pollTimer = null;

    function schedulePoll(delay) {
      clearTimeout(pollTimer);
      pollTimer = setTimeout(poll, delay);
    }

    async function poll() {
      try {
        const resp = await fetch("/status?offset=" + offset);
        if (!resp.ok) {
          showError("lost connection to server");
          schedulePoll(5000);
          return;
        }
        showError("");
        const data = await resp.json();
        if (data.log) {
          logEl.textContent += data.log;
          logEl.scrollTop = logEl.scrollHeight;
        }
        offset = data.offset;
        setStatus(data.status);

        if (data.status === "done") {
          setBusy(false);
          renderResults(data.result);
          // Job finished — stop polling until a new run starts.
        } else if (data.status === "failed") {
          setBusy(false);
          showError(data.error || "run failed");
          // Job finished — stop polling until a new run starts.
        } else {
          setBusy(data.status === "starting" || data.status === "running");
          schedulePoll(5000);
        }
      } catch (e) {
        showError("lost connection to server");
        schedulePoll(5000);
      }
    }

    form.addEventListener("submit", async (ev) => {
      ev.preventDefault();
      showError("");
      logEl.textContent = "";
      resultsEl.innerHTML = "";
      resultsPanel.hidden = true;
      offset = 0;
      const formData = new FormData(form);
      formData.set("captions", document.getElementById("captions").checked ? "true" : "false");
      formData.set("word_highlight", document.getElementById("word_highlight").checked ? "true" : "false");

      try {
        const resp = await fetch("/run", { method: "POST", body: formData });
        const data = await resp.json();
        if (!resp.ok) {
          showError(data.error || "failed to start run");
          return;
        }
        setBusy(true);
        setStatus(data.status);
        schedulePoll(0);
      } catch (e) {
        showError("failed to start run");
      }
    });

    const tabButtons = document.querySelectorAll(".tab-btn");
    const tabGenerate = document.getElementById("tab-generate");
    const tabHistory = document.getElementById("tab-history");
    const historyList = document.getElementById("history-list");
    const historyRefreshBtn = document.getElementById("history-refresh");

    function formatBytes(bytes) {
      if (!bytes) return "0 B";
      const units = ["B", "KB", "MB", "GB"];
      let value = bytes;
      let i = 0;
      while (value >= 1024 && i < units.length - 1) {
        value /= 1024;
        i++;
      }
      return value.toFixed(i === 0 ? 0 : 1) + " " + units[i];
    }

    function formatDate(epochSeconds) {
      return new Date(epochSeconds * 1000).toLocaleString();
    }

    function updateHistoryItem(labelEl, btnEl, kind, run) {
      if (kind === "source") {
        labelEl.textContent = run.source_exists
          ? "Source: " + formatBytes(run.source_size)
          : "Source: deleted";
        btnEl.disabled = !run.source_exists;
      } else {
        labelEl.textContent = run.shorts_count > 0
          ? "Shorts: " + run.shorts_count + " clips, " + formatBytes(run.shorts_size)
          : "Shorts: none";
        btnEl.disabled = run.shorts_count === 0;
      }
    }

    async function deleteHistoryFiles(name, action, kind, labelEl, btnEl) {
      const what = kind === "source" ? "the source video" : "the shorts clips";
      if (!confirm("Delete " + what + " for \"" + name + "\"? This can't be undone.")) return;
      btnEl.disabled = true;
      try {
        const resp = await fetch("/history/" + encodeURIComponent(name) + "/" + action, { method: "POST" });
        const data = await resp.json();
        if (!resp.ok) {
          showError(data.error || "delete failed");
          btnEl.disabled = false;
          return;
        }
        showError("");
        updateHistoryItem(labelEl, btnEl, kind, data);
      } catch (e) {
        showError("lost connection to server");
        btnEl.disabled = false;
      }
    }

    function renderHistoryRow(run) {
      const row = document.createElement("div");
      row.className = "history-row";

      const nameEl = document.createElement("div");
      nameEl.className = "history-name";
      nameEl.textContent = run.name;
      row.appendChild(nameEl);

      const dateEl = document.createElement("div");
      dateEl.className = "history-date";
      dateEl.textContent = formatDate(run.mtime);
      row.appendChild(dateEl);

      const sourceItem = document.createElement("div");
      sourceItem.className = "history-item";
      const sourceLabel = document.createElement("span");
      sourceItem.appendChild(sourceLabel);
      const sourceBtn = document.createElement("button");
      sourceBtn.type = "button";
      sourceBtn.className = "history-delete-btn";
      sourceBtn.textContent = "Delete";
      sourceItem.appendChild(sourceBtn);
      updateHistoryItem(sourceLabel, sourceBtn, "source", run);
      sourceBtn.addEventListener("click", () => deleteHistoryFiles(run.name, "delete-source", "source", sourceLabel, sourceBtn));
      row.appendChild(sourceItem);

      const shortsItem = document.createElement("div");
      shortsItem.className = "history-item";
      const shortsLabel = document.createElement("span");
      shortsItem.appendChild(shortsLabel);
      const shortsBtn = document.createElement("button");
      shortsBtn.type = "button";
      shortsBtn.className = "history-delete-btn";
      shortsBtn.textContent = "Delete";
      shortsItem.appendChild(shortsBtn);
      updateHistoryItem(shortsLabel, shortsBtn, "shorts", run);
      shortsBtn.addEventListener("click", () => deleteHistoryFiles(run.name, "delete-shorts", "shorts", shortsLabel, shortsBtn));
      row.appendChild(shortsItem);

      return row;
    }

    async function loadHistory() {
      historyList.innerHTML = "";
      try {
        const resp = await fetch("/history");
        if (!resp.ok) {
          showError("failed to load history");
          return;
        }
        showError("");
        const data = await resp.json();
        if (!data.runs || data.runs.length === 0) {
          const empty = document.createElement("div");
          empty.className = "history-empty";
          empty.textContent = "No runs yet.";
          historyList.appendChild(empty);
          return;
        }
        for (const run of data.runs) {
          historyList.appendChild(renderHistoryRow(run));
        }
      } catch (e) {
        showError("failed to load history");
      }
    }

    function setActiveTab(tab) {
      for (const btn of tabButtons) {
        btn.classList.toggle("is-active", btn.dataset.tab === tab);
      }
      tabGenerate.hidden = tab !== "generate";
      tabHistory.hidden = tab !== "history";
      if (tab === "history") loadHistory();
    }

    for (const btn of tabButtons) {
      btn.addEventListener("click", () => setActiveTab(btn.dataset.tab));
    }
    historyRefreshBtn.addEventListener("click", loadHistory);

    poll();
  </script>
</body>
</html>
